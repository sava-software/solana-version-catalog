name: Publish Release GitHub Packages

on:
  push:
    tags:
      - '[0-9]*.[0-9]*.[0-9]*'

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    uses: sava-software/sava-build/.github/workflows/publish-gh.yml@main
    secrets: inherit
    with:
      attest-subject-path: |
        **/build/version-catalog/*.toml
        **/build/publications/*/module.json
        **/build/publications/*/pom-default.xml
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      artifact-metadata: write
